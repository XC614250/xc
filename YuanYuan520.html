<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>源源天下第一可爱</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    min-height: 100vh;
    background: #fff0f6;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }

  .danmaku {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  .bubble {
    position: absolute;
    padding: 10px 20px;
    border-radius: 30px;
    white-space: nowrap;
    color: #ff5e91;
    background: rgba(255, 255, 255, 0.3);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 180, 210, 0.4);
    box-shadow: 0 4px 15px rgba(255, 120, 170, 0.15);
    animation: float linear infinite;
    font-size: clamp(16px, 4vw, 24px);
  }

  @keyframes float {
    0% { transform: translateX(105vw); }
    100% { transform: translateX(-105vw); }
  }

  .click-tip {
    position: fixed;
    color: #ff4a8e;
    font-weight: bold;
    pointer-events: none;
    animation: clickPop 0.8s forwards;
    z-index: 999;
    font-size: clamp(18px, 5vw, 28px);
    text-shadow: 0 2px 4px rgba(255, 74, 142, 0.2);
  }

  @keyframes clickPop {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-30px); }
  }
</style>
</head>
<body>
  <div class="danmaku" id="danmaku"></div>

  <script>
    const blessings = [
      '祝源源天天开心',
      '祝源源永远可爱',
      '祝源源平安喜乐',
      '祝源源万事顺意',
      '祝源源被爱包围',
      '祝源源心想事成',
      '祝源源无忧无虑',
      '祝源源闪闪发光'
    ];

    const danmaku = document.getElementById('danmaku');

    function createDanmaku() {
      const b = document.createElement('div');
      b.className = 'bubble';
      b.innerText = blessings[Math.floor(Math.random() * blessings.length)];
      b.style.top = Math.random() * 90 + '%';
      b.style.animationDuration = (Math.random() * 6 + 8) + 's';
      b.style.opacity = Math.random() * 0.4 + 0.6;
      danmaku.appendChild(b);
      setTimeout(() => {
        if (b.parentNode) b.parentNode.removeChild(b);
      }, parseFloat(b.style.animationDuration) * 1000);
    }

    // 超多发弹幕：每 200 毫秒一条，超级多
    setInterval(createDanmaku, 200);

    const replies = [
      '源源天下第一可爱！(* /ω＼*)',
      '源源最最最可爱啦～(๑˃̵ᴗ˂̵)و',
      '全世界最喜欢源源！(｡･ω･｡)ﾉ♡',
      '源源可爱到爆炸！(*≧∀≦*)',
      '源源是小天使！(｡•̀ᴗ-)✧',
      '源源可爱无敌！(๑˃̵ᴗ˂̵)و'
    ];

    document.addEventListener('click', (e) => {
      const tip = document.createElement('div');
      tip.className = 'click-tip';
      tip.innerText = replies[Math.floor(Math.random() * replies.length)];
      tip.style.left = e.clientX - tip.offsetWidth / 2 + 'px';
      tip.style.top = e.clientY - 20 + 'px';
      document.body.appendChild(tip);
      setTimeout(() => {
        if (tip.parentNode) tip.parentNode.removeChild(tip);
      }, 800);
    });
  </script>
</body>
</html>
