<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>源源天下第一可爱</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    min-height: 100vh;
    background: #fff0f6;
    overflow: hidden;
  }

  /* 弹幕层 */
  .danmaku {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  /* 玻璃弹幕 */
  .bubble {
    position: absolute;
    padding: 6px 14px;
    border-radius: 30px;
    font-size: 15px;
    white-space: nowrap;
    color: #ff5e91;
    background: rgba(255, 255, 255, 0.3);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 180, 210, 0.4);
    box-shadow: 0 4px 15px rgba(255, 120, 170, 0.15);
    animation: float linear infinite;
  }

  @keyframes float {
    0% { transform: translateX(105vw); }
    100% { transform: translateX(-105vw); }
  }

  /* 点击弹出文字 */
  .click-tip {
    position: fixed;
    font-size: 18px;
    color: #ff4a8e;
    font-weight: bold;
    pointer-events: none;
    animation: clickPop 0.8s forwards;
    z-index: 999;
  }

  @keyframes clickPop {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-30px); }
  }
</style>
</head>

<body>
<div class="danmaku" id="danmaku"></div>

<script>
  const danmaku = document.getElementById('danmaku');

  // 弹幕：祝源源天天开心
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const b = document.createElement('div');
      b.className = 'bubble';
      b.innerText = '祝源源天天开心';
      b.style.top = Math.random() * 90 + '%';
      b.style.animationDuration = (Math.random() * 12 + 8) + 's';
      b.style.fontSize = (Math.random() * 6 + 14) + 'px';
      b.style.opacity = Math.random() * 0.4 + 0.5;
      danmaku.appendChild(b);
      setTimeout(() => b.remove(), parseFloat(b.style.animationDuration) * 1000);
    }, i * 180);
  }

  // 点击回复
  const replies = [
    '源源天下第一可爱！(* /ω＼*)',
    '源源最最最可爱啦～(๑˃̵ᴗ˂̵)و',
    '全世界最喜欢源源！(｡･ω･｡)ﾉ♡',
    '源源可爱到爆炸！(*≧∀≦*)',
    '源源是小天使！(｡•̀ᴗ-)✧',
    '源源可爱无敌！(๑˃̵ᴗ˂̵)و'
  ];

  document.addEventListener('click', (e) => {
    const tip = document.createElement('div');
    tip.className = 'click-tip';
    tip.innerText = replies[Math.floor(Math.random() * replies.length)];
    tip.style.left = e.clientX - 60 + 'px';
    tip.style.top = e.clientY - 20 + 'px';
    document.body.appendChild(tip);
    setTimeout(() => tip.remove(), 800);
  });
</script>
</body>
</html>
